<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password - Sudoku Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2 style="margin-top: 0; margin-bottom: 20px;">Reset Password</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Enter your registered email address and we will send you a 6-digit reset code.</p>

        {% if message %}
            <div style="background-color: #e3f2fd; color: #1565c0; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; font-size: 14px;">
                {{ message }}
            </div>
        {% endif %}

        <form action="/forgot_password" method="POST">
            <div style="text-align: left; margin-bottom: 20px;">
                <label for="email">Email Address:</label>
                <input type="email" name="email" id="email" required>
            </div>
            <button type="submit" class="menu-btn primary">Send Code</button>
        </form>
        <p style="margin-top: 20px;"><a href="/login" style="color: #888; text-decoration: none;">⬅️ Back to Login</a></p>
    </div>
</body>
</html>
