<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enter Reset Code - Sudoku Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2 style="margin-top: 0; margin-bottom: 10px;">Enter Reset Code</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">We sent a 6-digit code to <strong>{{ email }}</strong></p>

        {% if message %}
            <div style="background-color: #ffcdd2; color: #b71c1c; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; font-size: 14px;">
                {{ message }}
            </div>
        {% endif %}

        <form action="/reset_password" method="POST">
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="otp">6-Digit Code:</label>
                <input type="text" name="otp" id="otp" required maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px; font-weight: bold;">
            </div>
            <div style="text-align: left; margin-bottom: 20px;">
                <label for="new_password">New Password:</label>
                <div>
                    <input type="password" name="new_password" id="new_password" required style="width: 85%;">
                    <button type="button" id="togglePassword" style="cursor: pointer; background: none; border: none; font-size: 1.2rem;">👁️</button>
                </div>
            </div>
            <button type="submit" class="menu-btn secondary">Update Password</button>
        </form>
    </div>

    <script>
        const passwordInput = document.getElementById('new_password');
        const toggleButton = document.getElementById('togglePassword');
        toggleButton.addEventListener('click', function(){
            if (passwordInput.type === 'password'){
                passwordInput.type = 'text';
                toggleButton.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '👁️';
            }
        });
    </script>
</body>
</html>
