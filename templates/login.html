<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sudoku Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h1>Login</h1>

        <form action="/login" method="POST">
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="password">Password:</label>
                <div>
                    <input type="password" id="password" name="password" required style="width: 85%;">
                    <button type="button" id="togglePassword" style="cursor: pointer; background: none; border: none; font-size: 1.2rem;">👁️</button>
                </div>
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="/forgot_password" style="font-size: 14px; color: #2196F3; text-decoration: none; font-weight: bold;">Fogot Password?</a>
            </div>
            <button type="submit" class="menu-btn primary">Login</button>
        </form>
        <p style="margin-top: 20px;">Don't have an account? <br><a href="/register">Register here</a>.</p>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        toggleButton.addEventListener('click', function(){
            if (passwordInput.type === 'password'){
                passwordInput.type = 'text';
                toggleButton.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '👁️';
            }
        });
    </script>
</body>
</html>
