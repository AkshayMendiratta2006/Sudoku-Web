<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - Sudoku Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="auth-container">
        <h1>Create an Account</h1>
        {% if message %}
            <div style="background-color: #ffcdd2; color: #b71c1c; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; font-size: 14px;">
                {{ message }}
            </div>
        {% endif %}
        <form action="/register" method="POST">
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label for="password">Password:</label>
                <div >
                    <input type="password" id="password" name="password" required style="width: 85%;">
                    <button type="button" id="togglePassword" style="cursor: pointer; background: none; border: none; font-size: 1.2rem;">👁️</button>
                </div>
            </div>
            <div style="display: flex; justify-content: center; margin-bottom: 15px;">
                <div class="g-recaptcha" data-sitekey="6LfYfJ4sAAAAAK-9sWW-jppSfpDDpVlu9WOKFOp0"></div>
            </div>
            <div style="margin-top: 15px; margin-bottom: 15px; text-align: left; font-size: 14px;">
                <input type="checkbox" id="terms" name="terms" required style="width: auto; margin-right: 8px;">
                <label for="terms">I agree to the <a href="/terms" style="color: #2196F3;">Terms & Conditions</a></label>
            </div>
            <br>
            <button type="submit" class="menu-btn primary">Register</button>
        </form>
        <p style="margin-top: 20px;">Already have an account? <br><a href="/login">Login here</a>.</p>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');

        toggleButton.addEventListener('click', function(){
            if (passwordInput.type === 'password'){
                passwordInput.type = 'text';
                toggleButton.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '👁️';
            }
        })
    </script>
</body>
</html>
