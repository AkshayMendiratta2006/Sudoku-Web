<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sudoku Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-logged-in="{{ 'true' if current_user.is_authenticated else 'false' }}">
  <nav class="top-bar">
    {% if current_user.is_authenticated %}
      <a href="/settings" class="nav-link profile-link">
        <img src="https://ui-avatars.com/api/?name={{ current_user.username }}&background=random" alt="Profile" class="profile-pic">
      </a>
    {% else %}
      <a href="/login" class="nav-link login-link">Login</a>
    {% endif %}
      <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
  </nav>

  <div id="dashboard-view" class="screen active">
    <h1>Sudoku</h1>
    <div class="menu-buttons">
      {% if current_user.is_authenticated and current_user.saved_puzzle %}
        <button id="btn-continue" class="menu-btn primary">Continue Game</button>
      {% endif %}
      <button id="btn-new-game" class="menu-btn {% if current_user.is_authenticated and current_user.saved_puzzle %}secondary{% else %}primary{% endif %}">New Game</button>
      <a href="/history" class="menu-btn secondary"> History</a>
    </div>
  </div>

  <div id="difficulty-popup" class="popup">
    <div class="popup-content">
      <h3>Select Difficulty</h3>
      <button class="diff-btn" data-level="easy">Easy</button>
      <button class="diff-btn" data-level="medium">Medium</button>
      <button class="diff-btn" data-level="hard">Hard</button>
      <button id="btn-close-popup" class="cancel-btn">Cancel</button>
    </div>
  </div>

  <div id="game-view" class="screen">
    <div class="game-header">
      <button id="btn-pause" class="back-btn">⏸️ Pause</button>
      <span id="timer">00:00</span>
      <span id="mistakes">Mistakes: 0/3</span>
    </div>

    <div id="sudoku-board" class="board"></div>

    <div class="tools">
      <button id="btn-undo">↩ Undo</button>
      <button id="btn-eraser">◻️ Eraser</button>
      <button id="btn-pencil">✏️ Notes</button>
    </div>
  </div>

  <div id="animation-container"></div>

  <div id="pause-modal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-top: 0; margin-bottom: 20px;">Game Paused</h2>
      <div class="menu-buttons" style="margin: 0 auto;">
        <button id="btn-resume" class="menu-btn primary">▶️ Continue</button>
        <button id="btn-pause-main-menu" class="menu-btn secondary">🏠 Main Menu</button>
      </div>
    </div>
  </div>

  <div id="game-over-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close-btn">&times;</span>
      <div id="modal-icon" class="modal-icon">🏆</div>
      <h2 id="modal-title">You Won!</h2>
      <p id="modal-message">Time: <span id="final-time">00:00</span></p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
